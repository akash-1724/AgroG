name: AgroGuide Monorepo CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-ci:
    name: Backend CI (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx ruff

      - name: Lint with Ruff
        run: |
          cd backend
          ruff check .

      - name: Run Backend Tests
        run: |
          cd backend
          pytest

  ml_service-ci:
    name: ML Service CI (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd ml_service
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest ruff

      - name: Lint with Ruff
        run: |
          cd ml_service
          ruff check .

      - name: Run ML Tests
        run: |
          cd ml_service
          pytest

  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Code Linting
        run: |
          cd frontend
          npm run lint

      - name: TypeScript Compile Check
        run: |
          cd frontend
          npx tsc --noEmit
