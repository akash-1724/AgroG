name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m pytest app/tests/test_backend.py
        env:
          PYTHONPATH: .
          ENVIRONMENT: development
          JWT_SECRET: ci-backend-access-secret-change-me
          JWT_REFRESH_SECRET: ci-backend-refresh-secret-change-me
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          ML_SERVICE_URL: "http://localhost:8001"

  ml-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml_service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ml_service/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest tests/test_ml.py
        env:
          PYTHONPATH: ..
          ML_DEMO_MODE: "True"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
