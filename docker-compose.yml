version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: agroguide-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: agroguide
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agroguide-redis
    restart: always
    ports:
      - "6389:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agroguide-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgrespassword}@db:5432/agroguide
      - REDIS_URL=redis://redis:6379/0
      - ML_SERVICE_URL=http://ml_service:8001
      - JWT_SECRET=${JWT_SECRET:-super-secret-change-me-in-production-12345}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-another-super-secret-refresh-key-98765}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
      - redis

  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: agroguide-ml-service
    restart: always
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - CROP_MODEL_PATH=models/crop_xgb.json
      - FERTILIZER_MODEL_PATH=models/fertilizer_dt.pkl
      - ML_DEMO_MODE=${ML_DEMO_MODE:-False}
      - MAX_IMAGE_UPLOAD_MB=5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agroguide-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
